<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f111a" />
      <stop offset="100%" stop-color="#141923" />
    </linearGradient>
    
    <!-- Phone Screen Gradient -->
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Accent Blue Gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>

    <!-- Card Gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0.5" />
    </linearGradient>

    <!-- Purple Status Gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#38bdf8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Canvas Background -->
  <rect width="400" height="300" rx="16" fill="url(#bgGrad)" />

  <!-- Grid Pattern Overlay -->
  <g opacity="0.05">
    <path d="M 0,30 L 400,30 M 0,60 L 400,60 M 0,90 L 400,90 M 0,120 L 400,120 M 0,150 L 400,150 M 0,180 L 400,180 M 0,210 L 400,210 M 0,240 L 400,240 M 0,270 L 400,270" stroke="#ffffff" stroke-width="1"/>
    <path d="M 40,0 L 40,300 M 80,0 L 80,300 M 120,0 L 120,300 M 160,0 L 160,300 M 200,0 L 200,300 M 240,0 L 240,300 M 280,0 L 280,300 M 320,0 L 320,300 M 360,0 L 360,300" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Glowing background circles -->
  <circle cx="320" cy="80" r="50" fill="#38bdf8" opacity="0.05" filter="url(#glow)"/>
  <circle cx="100" cy="220" r="60" fill="#a3e635" opacity="0.03" filter="url(#glow)"/>

  <!-- Phone Mockup Container -->
  <g transform="translate(130, 20)">
    <!-- Phone Body / Bezel -->
    <rect width="140" height="260" rx="18" fill="#090d16" stroke="#475569" stroke-width="3"/>
    <!-- Phone Screen -->
    <rect x="5" y="5" width="130" height="250" rx="14" fill="url(#phoneGrad)"/>
    <!-- Phone Camera Notch -->
    <rect x="45" y="5" width="50" height="12" rx="6" fill="#090d16"/>
    
    <!-- Top Navigation Bar inside Phone -->
    <text x="15" y="32" font-family="'Outfit', sans-serif" font-size="9" fill="#94a3b8" font-weight="600">Cybernet Supplier</text>
    <!-- Sync Status Icon -->
    <path d="M112,29 A4,4 0 1,1 118,29 M118,29 L120,27 M118,29 L116,27" fill="none" stroke="#38bdf8" stroke-width="1" filter="url(#glow)"/>

    <!-- Supplier ERP Metrics Bar Chart widget inside Phone -->
    <rect x="10" y="44" width="120" height="56" rx="6" fill="url(#cardGrad)" stroke="#475569" stroke-width="0.5"/>
    <text x="16" y="55" font-family="sans-serif" font-size="7" fill="#f8fafc" font-weight="600">Inventory Supply</text>
    
    <!-- Bar charts -->
    <rect x="25" y="76" width="8" height="16" rx="1" fill="#38bdf8"/>
    <text x="24" y="69" font-family="sans-serif" font-size="5" fill="#94a3b8">Jan</text>
    
    <rect x="45" y="66" width="8" height="26" rx="1" fill="#38bdf8"/>
    <text x="44" y="59" font-family="sans-serif" font-size="5" fill="#94a3b8">Feb</text>

    <rect x="65" y="62" width="8" height="30" rx="1" fill="url(#blueGrad)" filter="url(#glow)"/>
    <text x="64" y="55" font-family="sans-serif" font-size="5" fill="#38bdf8" font-weight="bold">Mar</text>

    <rect x="85" y="70" width="8" height="22" rx="1" fill="#38bdf8"/>
    <text x="84" y="63" font-family="sans-serif" font-size="5" fill="#94a3b8">Apr</text>

    <rect x="105" y="74" width="8" height="18" rx="1" fill="#38bdf8"/>
    <text x="104" y="67" font-family="sans-serif" font-size="5" fill="#94a3b8">May</text>

    <line x1="20" y1="92" x2="120" y2="92" stroke="#475569" stroke-width="0.5"/>

    <!-- Active Orders Title -->
    <text x="12" y="112" font-family="sans-serif" font-size="8" fill="#f8fafc" font-weight="600">Active Shipments</text>

    <!-- Order Item 1 -->
    <rect x="10" y="118" width="120" height="28" rx="4" fill="url(#cardGrad)" stroke="#1e293b" stroke-width="0.5"/>
    <text x="16" y="129" font-family="sans-serif" font-size="7" fill="#f8fafc" font-weight="500">Order #SU-9823</text>
    <text x="16" y="138" font-family="sans-serif" font-size="6" fill="#94a3b8">Supplier Depot Kochi</text>
    <!-- Pending Badge -->
    <rect x="94" y="123" width="30" height="8" rx="2" fill="#eab308" fill-opacity="0.2"/>
    <text x="98" y="129" font-family="sans-serif" font-size="5" fill="#facc15" font-weight="bold">PENDING</text>

    <!-- Order Item 2 -->
    <rect x="10" y="150" width="120" height="28" rx="4" fill="url(#cardGrad)" stroke="#1e293b" stroke-width="0.5"/>
    <text x="16" y="161" font-family="sans-serif" font-size="7" fill="#f8fafc" font-weight="500">Order #SU-9824</text>
    <text x="16" y="170" font-family="sans-serif" font-size="6" fill="#94a3b8">Bayasys Distribution</text>
    <!-- Shipped Badge -->
    <rect x="94" y="155" width="30" height="8" rx="2" fill="#22c55e" fill-opacity="0.2"/>
    <text x="98" y="161" font-family="sans-serif" font-size="5" fill="#4ade80" font-weight="bold">SHIPPED</text>

    <!-- Order Item 3 -->
    <rect x="10" y="182" width="120" height="28" rx="4" fill="url(#cardGrad)" stroke="#1e293b" stroke-width="0.5"/>
    <text x="16" y="193" font-family="sans-serif" font-size="7" fill="#f8fafc" font-weight="500">Order #SU-9825</text>
    <text x="16" y="202" font-family="sans-serif" font-size="6" fill="#94a3b8">Skyewall Kayaks</text>
    <!-- Pending Badge -->
    <rect x="94" y="187" width="30" height="8" rx="2" fill="#eab308" fill-opacity="0.2"/>
    <text x="98" y="193" font-family="sans-serif" font-size="5" fill="#facc15" font-weight="bold">PENDING</text>

    <!-- Bottom Navigation Bar inside Phone -->
    <rect x="5" y="218" width="130" height="32" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
    <circle cx="25" cy="232" r="4" fill="none" stroke="#64748b" stroke-width="1"/>
    <!-- Dashboard Icon active -->
    <rect x="53" y="228" width="10" height="8" fill="url(#blueGrad)" rx="1"/>
    <rect x="53" y="238" width="4" height="4" fill="url(#blueGrad)" rx="0.5"/>
    <rect x="59" y="238" width="4" height="4" fill="url(#blueGrad)" rx="0.5"/>
    <circle cx="90" cy="232" r="4" fill="none" stroke="#64748b" stroke-width="1"/>
    <circle cx="120" cy="232" r="4" fill="none" stroke="#64748b" stroke-width="1"/>
  </g>

  <!-- External Elements / Visual Metaphors -->
  <!-- Real-time Synchronization DB icon on the right -->
  <g transform="translate(285, 110)">
    <rect width="90" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <!-- DB cylinders -->
    <path d="M15,22 C15,18 35,18 35,22 C35,26 15,26 15,22 M15,28 C15,24 35,24 35,28 M15,34 C15,30 35,30 35,34" fill="none" stroke="#38bdf8" stroke-width="1.2"/>
    <path d="M15,22 V34 M35,22 V34" fill="none" stroke="#38bdf8" stroke-width="1.2"/>
    <text x="42" y="27" font-family="sans-serif" font-size="7" fill="#f8fafc" font-weight="600">Database</text>
    <text x="42" y="37" font-family="sans-serif" font-size="6" fill="#94a3b8">SQL Sync</text>
    <!-- Sync progress bar -->
    <rect x="15" y="46" width="60" height="4" rx="2" fill="#334155"/>
    <rect x="15" y="46" width="45" height="4" rx="2" fill="url(#blueGrad)" filter="url(#glow)"/>
    <text x="65" y="42" font-family="monospace" font-size="6" fill="#38bdf8" font-weight="bold">75%</text>
  </g>

  <!-- Cloud Sync arrows on the left -->
  <g transform="translate(30, 80)">
    <circle cx="25" cy="25" r="20" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <path d="M17,25 A8,8 0 0,1 29,18 M33,25 A8,8 0 0,1 21,32" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
    <path d="M29,18 L25,16 M29,18 L29,22 M21,32 L25,34 M21,32 L21,28" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
