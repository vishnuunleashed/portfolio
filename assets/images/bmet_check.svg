<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141923" />
      <stop offset="100%" stop-color="#0f111a" />
    </linearGradient>
    
    <!-- Phone Screen Gradient -->
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Accent Emerald/Green Gradient -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Card Gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.8" />
    </linearGradient>

    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#10b981" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Canvas Background -->
  <rect width="400" height="300" rx="16" fill="url(#bgGrad)" />

  <!-- Grid Pattern Overlay -->
  <g opacity="0.05">
    <path d="M 0,30 L 400,30 M 0,60 L 400,60 M 0,90 L 400,90 M 0,120 L 400,120 M 0,150 L 400,150 M 0,180 L 400,180 M 0,210 L 400,210 M 0,240 L 400,240 M 0,270 L 400,270" stroke="#ffffff" stroke-width="1"/>
    <path d="M 40,0 L 40,300 M 80,0 L 80,300 M 120,0 L 120,300 M 160,0 L 160,300 M 200,0 L 200,300 M 240,0 L 240,300 M 280,0 L 280,300 M 320,0 L 320,300 M 360,0 L 360,300" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Glowing background circles -->
  <circle cx="100" cy="80" r="55" fill="#10b981" opacity="0.04" filter="url(#glow)"/>
  <circle cx="300" cy="220" r="50" fill="#6366f1" opacity="0.03" filter="url(#glow)"/>

  <!-- Phone Mockup Container -->
  <g transform="translate(130, 20)">
    <!-- Phone Body / Bezel -->
    <rect width="140" height="260" rx="18" fill="#090d16" stroke="#475569" stroke-width="3"/>
    <!-- Phone Screen -->
    <rect x="5" y="5" width="130" height="250" rx="14" fill="url(#phoneGrad)"/>
    <!-- Phone Camera Notch -->
    <rect x="45" y="5" width="50" height="12" rx="6" fill="#090d16"/>
    
    <!-- Top Navigation Bar inside Phone -->
    <text x="15" y="32" font-family="'Outfit', sans-serif" font-size="9" fill="#94a3b8" font-weight="600">BMET Check</text>
    <!-- Encryption Lock Icon -->
    <path d="M116,25 H120 V30 H116 Z M117,25 V23 A1.5,1.5 0 0,1 120,23 V25" fill="none" stroke="#10b981" stroke-width="0.8" filter="url(#glow)"/>

    <!-- Scanning Viewfinder frame -->
    <g transform="translate(20, 50)">
      <!-- Viewfinder corners -->
      <path d="M 0,15 V 0 H 15" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
      <path d="M 80,0 H 95 V 15" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
      <path d="M 0,80 V 95 H 15" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
      <path d="M 80,95 H 95 V 80" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
      
      <!-- QR Code Matrix Mockup -->
      <g fill="#f8fafc" opacity="0.85">
        <!-- Top Left Position Detection Pattern -->
        <rect x="8" y="8" width="20" height="20" rx="2" fill="none" stroke="#f8fafc" stroke-width="2"/>
        <rect x="13" y="13" width="10" height="10" rx="1" fill="#f8fafc"/>
        
        <!-- Top Right Position Detection Pattern -->
        <rect x="67" y="8" width="20" height="20" rx="2" fill="none" stroke="#f8fafc" stroke-width="2"/>
        <rect x="72" y="13" width="10" height="10" rx="1" fill="#f8fafc"/>
        
        <!-- Bottom Left Position Detection Pattern -->
        <rect x="8" y="67" width="20" height="20" rx="2" fill="none" stroke="#f8fafc" stroke-width="2"/>
        <rect x="13" y="72" width="10" height="10" rx="1" fill="#f8fafc"/>

        <!-- Mini QR code squares -->
        <rect x="36" y="8" width="6" height="6" rx="1"/>
        <rect x="48" y="8" width="6" height="6" rx="1"/>
        <rect x="36" y="20" width="12" height="6" rx="1"/>
        
        <rect x="8" y="36" width="6" height="12" rx="1"/>
        <rect x="20" y="44" width="6" height="6" rx="1"/>

        <rect x="36" y="36" width="18" height="18" rx="2" opacity="0.4"/>
        <rect x="67" y="36" width="12" height="6" rx="1"/>
        <rect x="73" y="48" width="6" height="12" rx="1"/>

        <rect x="42" y="62" width="12" height="6" rx="1"/>
        <rect x="36" y="74" width="6" height="12" rx="1"/>
        <rect x="54" y="74" width="18" height="6" rx="1"/>
        <rect x="78" y="74" width="6" height="6" rx="1"/>
      </g>

      <!-- Scanning red/laser line -->
      <line x1="-5" y1="48" x2="100" y2="48" stroke="#10b981" stroke-width="1.5" filter="url(#glow)"/>
    </g>

    <!-- Scan Status Dialog -->
    <rect x="10" y="160" width="120" height="50" rx="6" fill="url(#cardGrad)" stroke="#10b981" stroke-width="0.8" filter="url(#glow)"/>
    
    <!-- Success Badge icon -->
    <circle cx="26" cy="185" r="10" fill="url(#greenGrad)"/>
    <path d="M22,185 L25,188 L30,182" fill="none" stroke="#020617" stroke-width="2" stroke-linecap="round"/>
    
    <text x="42" y="180" font-family="sans-serif" font-size="7" fill="#f8fafc" font-weight="600">Verification OK</text>
    <text x="42" y="189" font-family="sans-serif" font-size="5.5" fill="#94a3b8">ID: BMET-9831-XP</text>
    <text x="42" y="197" font-family="sans-serif" font-size="5.5" fill="#34d399" font-weight="bold">Encrypted Handshake</text>

    <!-- Bottom Navigation Bar inside Phone -->
    <rect x="5" y="218" width="130" height="32" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
    <circle cx="25" cy="232" r="4" fill="none" stroke="#64748b" stroke-width="1"/>
    <!-- QR scanner Active Icon -->
    <g transform="translate(58, 226)">
      <rect width="12" height="12" rx="2" fill="none" stroke="#10b981" stroke-width="1"/>
      <circle cx="6" cy="6" r="2" fill="#10b981"/>
    </g>
    <circle cx="95" cy="232" r="4" fill="none" stroke="#64748b" stroke-width="1"/>
    <circle cx="120" cy="232" r="4" fill="none" stroke="#64748b" stroke-width="1"/>
  </g>

  <!-- External Elements / Visual Metaphors -->
  <!-- Encrypted lock floating on the right -->
  <g transform="translate(290, 85)" filter="url(#glow)">
    <rect width="80" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <!-- Shield Icon -->
    <path d="M12,15 V20 C12,25 22,29 22,29 C22,29 32,25 32,20 V15 H22 Z" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M22,18 L24,20 L28,16" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/>
    <text x="38" y="24" font-family="sans-serif" font-size="7" fill="#f8fafc" font-weight="600">AES-256</text>
    <text x="38" y="34" font-family="sans-serif" font-size="6" fill="#94a3b8">Secure Scan</text>
  </g>

  <!-- Secure Key floating on the left -->
  <g transform="translate(45, 90)">
    <circle cx="20" cy="20" r="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <path d="M15,22 A4,4 0 1,1 21,17 L25,13 L27,15 L28,14 L26,12 L28,10" fill="none" stroke="#10b981" stroke-width="1.5"/>
  </g>
</svg>
