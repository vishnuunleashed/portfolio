<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f111a" />
      <stop offset="100%" stop-color="#141923" />
    </linearGradient>
    
    <!-- Phone Screen Gradient -->
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Accent Indigo Gradient -->
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <!-- Card Gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0.5" />
    </linearGradient>

    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Canvas Background -->
  <rect width="400" height="300" rx="16" fill="url(#bgGrad)" />

  <!-- Grid Pattern Overlay -->
  <g opacity="0.05">
    <path d="M 0,30 L 400,30 M 0,60 L 400,60 M 0,90 L 400,90 M 0,120 L 400,120 M 0,150 L 400,150 M 0,180 L 400,180 M 0,210 L 400,210 M 0,240 L 400,240 M 0,270 L 400,270" stroke="#ffffff" stroke-width="1"/>
    <path d="M 40,0 L 40,300 M 80,0 L 80,300 M 120,0 L 120,300 M 160,0 L 160,300 M 200,0 L 200,300 M 240,0 L 240,300 M 280,0 L 280,300 M 320,0 L 320,300 M 360,0 L 360,300" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Glowing background circles -->
  <circle cx="300" cy="80" r="50" fill="#6366f1" opacity="0.05" filter="url(#glow)"/>
  <circle cx="100" cy="220" r="60" fill="#38bdf8" opacity="0.03" filter="url(#glow)"/>

  <!-- Phone Mockup Container -->
  <g transform="translate(130, 20)">
    <!-- Phone Body / Bezel -->
    <rect width="140" height="260" rx="18" fill="#090d16" stroke="#475569" stroke-width="3"/>
    <!-- Phone Screen -->
    <rect x="5" y="5" width="130" height="250" rx="14" fill="url(#phoneGrad)"/>
    <!-- Phone Camera Notch -->
    <rect x="45" y="5" width="50" height="12" rx="6" fill="#090d16"/>
    
    <!-- Top Navigation Bar inside Phone -->
    <text x="15" y="32" font-family="'Outfit', sans-serif" font-size="9" fill="#94a3b8" font-weight="600">Cybernet ERP</text>
    <!-- Enterprise status icon in app -->
    <circle cx="118" cy="29" r="3" fill="#6366f1" filter="url(#glow)"/>
    
    <!-- Welcome Header inside App -->
    <text x="12" y="52" font-family="sans-serif" font-size="8" fill="#f8fafc" font-weight="600">Enterprise Portal</text>
    <text x="12" y="60" font-family="sans-serif" font-size="6" fill="#94a3b8">Welcome, Administrator</text>

    <!-- Grid Menu Modules (2x3 Grid) -->
    <!-- Module 1: Finance -->
    <rect x="10" y="70" width="56" height="42" rx="6" fill="url(#cardGrad)" stroke="#1e293b" stroke-width="0.5"/>
    <rect x="28" y="76" width="20" height="15" rx="3" fill="none" stroke="#6366f1" stroke-width="1.2"/>
    <text x="36" y="86" font-family="sans-serif" font-size="9" fill="#6366f1" font-weight="bold">$</text>
    <text x="15" y="104" font-family="sans-serif" font-size="6.5" fill="#f8fafc" font-weight="500">Finance</text>

    <!-- Module 2: Inventory -->
    <rect x="74" y="70" width="56" height="42" rx="6" fill="url(#cardGrad)" stroke="#1e293b" stroke-width="0.5"/>
    <!-- Box Icon -->
    <path d="M96,76 L106,79 L101,82 L91,79 Z M91,80 V86 L96,89 V83 Z M106,80 V86 L101,89 V83 Z" fill="none" stroke="#6366f1" stroke-width="1"/>
    <text x="79" y="104" font-family="sans-serif" font-size="6.5" fill="#f8fafc" font-weight="500">Inventory</text>

    <!-- Module 3: Procurement -->
    <rect x="10" y="118" width="56" height="42" rx="6" fill="url(#cardGrad)" stroke="#1e293b" stroke-width="0.5"/>
    <!-- Shopping cart/procurement icon -->
    <path d="M22,123 H25 L28,131 H36 L39,126 H27" fill="none" stroke="#6366f1" stroke-width="1"/>
    <circle cx="30" cy="134" r="1.5" fill="#6366f1"/>
    <circle cx="36" cy="134" r="1.5" fill="#6366f1"/>
    <text x="14" y="152" font-family="sans-serif" font-size="6.5" fill="#f8fafc" font-weight="500">Procure...</text>

    <!-- Module 4: HRMS -->
    <rect x="74" y="118" width="56" height="42" rx="6" fill="url(#cardGrad)" stroke="#1e293b" stroke-width="0.5"/>
    <!-- People icon -->
    <circle cx="102" cy="127" r="3.5" fill="none" stroke="#6366f1" stroke-width="1"/>
    <path d="M96,136 A6,6 0 0,1 108,136" fill="none" stroke="#6366f1" stroke-width="1"/>
    <text x="79" y="152" font-family="sans-serif" font-size="6.5" fill="#f8fafc" font-weight="500">HRMS</text>

    <!-- Module 5: CRM -->
    <rect x="10" y="166" width="56" height="42" rx="6" fill="url(#cardGrad)" stroke="#1e293b" stroke-width="0.5"/>
    <!-- Handshake / Client relationship icon -->
    <path d="M22,175 C24,172 28,172 30,175 M34,175 C32,172 28,172 26,175 M28,178 H32" fill="none" stroke="#6366f1" stroke-width="1"/>
    <text x="15" y="200" font-family="sans-serif" font-size="6.5" fill="#f8fafc" font-weight="500">CRM</text>

    <!-- Module 6: Settings -->
    <rect x="74" y="166" width="56" height="42" rx="6" fill="url(#cardGrad)" stroke="#1e293b" stroke-width="0.5"/>
    <!-- Gear icon -->
    <circle cx="102" cy="180" r="4" fill="none" stroke="#6366f1" stroke-width="1"/>
    <circle cx="102" cy="180" r="1.5" fill="#6366f1"/>
    <text x="79" y="200" font-family="sans-serif" font-size="6.5" fill="#f8fafc" font-weight="500">Settings</text>

    <!-- Bottom Navigation Bar inside Phone -->
    <rect x="5" y="218" width="130" height="32" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
    <!-- Home active icon -->
    <circle cx="25" cy="232" r="5" fill="url(#indigoGrad)"/>
    <circle cx="58" cy="232" r="4" fill="none" stroke="#64748b" stroke-width="1"/>
    <circle cx="90" cy="232" r="4" fill="none" stroke="#64748b" stroke-width="1"/>
    <circle cx="120" cy="232" r="4" fill="none" stroke="#64748b" stroke-width="1"/>
  </g>

  <!-- External Elements / Visual Metaphors -->
  <!-- Financial chart stats box on the right -->
  <g transform="translate(285, 110)" filter="url(#glow)">
    <rect width="90" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="10" y="16" font-family="sans-serif" font-size="7" fill="#f8fafc" font-weight="600">Enterprise Revenue</text>
    <!-- Wave line -->
    <path d="M10,38 Q25,20 40,30 T70,22" fill="none" stroke="#6366f1" stroke-width="2"/>
    <circle cx="70" cy="22" r="3" fill="#818cf8"/>
  </g>

  <!-- Puzzle piece / connection element on the left -->
  <g transform="translate(30, 90)">
    <circle cx="20" cy="20" r="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <!-- Puzzle graphic -->
    <path d="M14,14 H20 A2,2 0 0,1 22,16 A2,2 0 0,1 24,14 H26 V20 A2,2 0 0,1 24,22 A2,2 0 0,1 26,24 V26 H14 Z" fill="none" stroke="#6366f1" stroke-width="1"/>
  </g>
</svg>
